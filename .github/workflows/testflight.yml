name: TestFlight

# Builds, archives with manual code signing, and uploads to App Store
# Connect.  A distribution certificate + provisioning profile (created once
# via developer.apple.com and stored as GitHub secrets) bypass Apple's
# restriction on API keys creating App Store profiles.
#
# Prerequisites (GitHub Secrets):
#   APPLE_TEAM_ID        — Apple Developer Team ID
#   APPLE_KEY_ID         — App Store Connect API key ID (for upload auth)
#   APPLE_ISSUER_ID      — App Store Connect API issuer UUID
#   APPLE_PRIVATE_KEY    — App Store Connect API private key (.p8)
#   DIST_CERT_BASE64     — base64 of Apple Distribution .cer
#   DIST_KEY_BASE64      — base64 of the private key (.key) matching the cert
#   DIST_PROFILE_BASE64  — base64 of App Store .mobileprovision file

on:
  push:
    branches: [main]
    paths:
      - 'YourApp.swiftpm/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: macos-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Set Apple Developer Team Identifier
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed -i '' "s/teamIdentifier: \"\"/teamIdentifier: \"${APPLE_TEAM_ID}\"/" \
            YourApp.swiftpm/Package.swift

      - name: Install distribution certificate & key
        id: signing
        env:
          DIST_CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
          DIST_KEY_BASE64: ${{ secrets.DIST_KEY_BASE64 }}
        run: |
          KEYCHAIN="build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          security set-keychain-settings -lut 7200 "${KEYCHAIN}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"

          echo "${DIST_CERT_BASE64}" | base64 -d > dist.cer
          echo "${DIST_KEY_BASE64}" | base64 -d > dist.key

          security import dist.cer -k "${KEYCHAIN}" -T /usr/bin/codesign -T /usr/bin/security
          security import dist.key -k "${KEYCHAIN}" -T /usr/bin/codesign -T /usr/bin/security -P ""

          # Pre-authorize codesign to use the private key without prompting —
          # without this, codesign hangs on headless CI waiting for a keychain
          # permission dialog that never appears.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"

          security list-keychain -d user -s "${KEYCHAIN}"
          security default-keychain -s "${KEYCHAIN}"

          # Extract the SHA-1 hash of the imported identity
          IDENTITY_HASH=$(security find-identity -v -p codesigning "${KEYCHAIN}" | \
            grep "Apple Distribution" | head -1 | awk '{print $2}')
          if [ -z "${IDENTITY_HASH}" ]; then
            echo "::error::No Apple Distribution identity found in keychain"
            security find-identity -v -p codesigning "${KEYCHAIN}"
            exit 1
          fi
          echo "identity=${IDENTITY_HASH}" >> "${GITHUB_OUTPUT}"
          echo "keychain_password=${KEYCHAIN_PASSWORD}" >> "${GITHUB_OUTPUT}"
          echo "Signing identity: ${IDENTITY_HASH}"

      - name: Install provisioning profile
        id: profile
        env:
          DIST_PROFILE_BASE64: ${{ secrets.DIST_PROFILE_BASE64 }}
        run: |
          echo "${DIST_PROFILE_BASE64}" | base64 -d > dist.mobileprovision
          PROFILE_UUID=$(security cms -D -i dist.mobileprovision 2>/dev/null | \
            plutil -extract UUID raw - 2>/dev/null || \
            grep -aA1 '<key>UUID</key>' dist.mobileprovision | tail -1 | \
            sed 's/.*<string>\(.*\)<\/string>.*/\1/')

          if [ -z "${PROFILE_UUID}" ]; then
            echo "::error::Could not extract UUID from provisioning profile"
            exit 1
          fi

          mkdir -p "${HOME}/Library/MobileDevice/Provisioning Profiles"
          cp dist.mobileprovision "${HOME}/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"
          echo "profile_uuid=${PROFILE_UUID}" >> "${GITHUB_OUTPUT}"
          echo "Installed profile: ${PROFILE_UUID}"

      - name: Unlock keychain before archive
        run: |
          security unlock-keychain -p "${{ steps.signing.outputs.keychain_password }}" build.keychain
          security set-keychain-settings -lut 7200 build.keychain

      - name: Archive app
        working-directory: YourApp.swiftpm
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -scheme YourApp \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "${GITHUB_WORKSPACE}/.build/YourApp.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ steps.signing.outputs.identity }}" \
            PROVISIONING_PROFILE="${{ steps.profile.outputs.profile_uuid }}" \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            INFOPLIST_KEY_ITSAppUsesNonExemptEncryption=NO

      - name: Export & upload to App Store Connect
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
        run: |
          mkdir -p .build .private
          printf '%s\n' "${APPLE_PRIVATE_KEY}" | tr -d '\r' > .private/appstore.p8

          cat > .build/exportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
              <key>destination</key>
              <string>upload</string>
              <key>manageAppVersionAndBuildNumber</key>
              <true/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>${{ steps.signing.outputs.identity }}</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.example.yourapp</key>
                  <string>${{ steps.profile.outputs.profile_uuid }}</string>
              </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath .build/YourApp.xcarchive \
            -exportOptionsPlist .build/exportOptions.plist \
            -exportPath .build/output \
            -authenticationKeyID "${{ secrets.APPLE_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APPLE_ISSUER_ID }}" \
            -authenticationKeyPath "${GITHUB_WORKSPACE}/.private/appstore.p8"

          echo "Upload complete — check App Store Connect → TestFlight"

      - name: Clean up
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
          rm -f dist.key dist.cer dist.mobileprovision .private/appstore.p8
